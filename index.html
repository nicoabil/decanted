<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecantEd - WSET Level 2 Study Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; color: #2D091D; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-malbec { background-color: #4A0E2E; }
        .text-malbec { color: #4A0E2E; }
        .border-malbec { border-color: #4A0E2E; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4A0E2E;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [view, setView] = useState('landing'); 
            const [mode, setMode] = useState(null); 
            const [questions, setQuestions] = useState([]);
            const [curr, setCurr] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            
            // Security: API Key state
            const [apiKey, setApiKey] = useState(localStorage.getItem('decanted_api_key') || "");
            const [showSettings, setShowSettings] = useState(false);

            // Timer Logic
            useEffect(() => {
                let timer;
                if (view === 'quiz' && mode === 50 && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                setView('results');
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [view, mode, timeLeft]);

            const saveKey = (e) => {
                e.preventDefault();
                const key = e.target.key.value.trim();
                localStorage.setItem('decanted_api_key', key);
                setApiKey(key);
                setShowSettings(false);
                setError(null);
            };

            const fetchQuestionsWithAI = async (count) => {
                if (!apiKey) {
                    setShowSettings(true);
                    return;
                }

                setLoading(true);
                setError(null);

                const systemPrompt = `You are a professional WSET Level 2 Wine Educator. 
                Generate ${count} highly accurate multiple-choice questions for the WSET Level 2 Award in Wines.
                Cover diverse topics: Viticulture, Winemaking, Key White/Black Varieties, Sparkling/Fortified wines, and Service/Storage.
                Return ONLY a JSON array of objects with this structure:
                {
                    "question": "string",
                    "options": ["string", "string", "string", "string"],
                    "correctIndex": number (0-3),
                    "explanation": "string explaining why the answer is correct"
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Generate ${count} WSET Level 2 practice questions.` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7 
                            }
                        })
                    });

                    if (!response.ok) throw new Error('Invalid API Key or Service Error');
                    
                    const data = await response.json();
                    const jsonString = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const parsedQuestions = JSON.parse(jsonString);
                    
                    setQuestions(parsedQuestions);
                    setMode(count);
                    setAnswers({});
                    setCurr(0);
                    if (count === 50) setTimeLeft(3600);
                    setView('quiz');
                } catch (err) {
                    console.error(err);
                    setError("Could not decant questions. Please check your API key in settings.");
                } finally {
                    setLoading(false);
                }
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const handleSelect = (idx) => {
                if (mode === 10 && answers[curr] !== undefined) return;
                setAnswers({ ...answers, [curr]: idx });
            };

            const calculateScore = () => {
                return Object.entries(answers).reduce((acc, [idx, ans]) => {
                    return acc + (ans === questions[idx].correctIndex ? 1 : 0);
                }, 0);
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in">
                    <div className="loader mb-6"></div>
                    <h2 className="serif text-3xl text-malbec font-bold">Selecting the Flight...</h2>
                    <p className="text-stone-500 mt-2 text-sm">AI is crafting your unique session.</p>
                </div>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in relative">
                    {/* Settings Button */}
                    <button 
                        onClick={() => setShowSettings(true)}
                        className="absolute top-6 right-6 p-2 text-stone-300 hover:text-malbec transition-colors"
                    >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    </button>

                    <div className="mb-8 p-6 bg-white rounded-3xl shadow-sm border border-stone-100">
                        <svg className="w-16 h-16 text-malbec mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    
                    <h1 className="serif text-6xl text-malbec font-black tracking-tight mb-2">DecantEd</h1>
                    <p className="text-stone-500 font-medium mb-12">WSET Level 2 AI Study Tool</p>

                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                        <button onClick={() => fetchQuestionsWithAI(10)} className="group bg-white p-6 rounded-2xl border-2 border-stone-100 hover:border-malbec transition-all text-left shadow-sm">
                            <h3 className="font-bold text-lg text-malbec">Quick Sip</h3>
                            <p className="text-sm text-stone-500">10 AI Questions • Untimed</p>
                        </button>

                        <button onClick={() => fetchQuestionsWithAI(50)} className="group bg-malbec p-6 rounded-2xl text-white hover:bg-[#2D091D] transition-all text-left shadow-xl">
                            <h3 className="font-bold text-lg">Full Vintage</h3>
                            <p className="text-sm text-white/70">50 AI Questions • 60 Min Timer</p>
                        </button>
                    </div>

                    {error && <div className="mt-8 p-4 bg-red-50 text-red-700 rounded-xl text-xs max-w-xs border border-red-100">{error}</div>}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl fade-in">
                                <h3 className="serif text-2xl font-bold mb-4">Cellar Access</h3>
                                <p className="text-stone-500 text-sm mb-6 leading-relaxed">To use AI generation, please enter your Gemini API Key. This is saved only in your browser.</p>
                                <form onSubmit={saveKey}>
                                    <input 
                                        name="key" 
                                        defaultValue={apiKey} 
                                        type="password" 
                                        placeholder="Paste AI Studio Key..." 
                                        className="w-full p-4 bg-stone-50 border border-stone-100 rounded-xl mb-4 focus:ring-2 focus:ring-malbec outline-none text-sm"
                                        required
                                    />
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowSettings(false)} className="flex-1 py-3 text-stone-400 font-bold">Cancel</button>
                                        <button type="submit" className="flex-1 py-3 bg-malbec text-white rounded-xl font-bold">Save Key</button>
                                    </div>
                                </form>
                                <p className="mt-6 text-[10px] text-stone-300 text-center uppercase tracking-widest">Safe & Private Local Storage</p>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'quiz') {
                const q = questions[curr];
                const answered = answers[curr] !== undefined;

                return (
                    <div className="min-h-screen flex flex-col fade-in">
                        <header className="bg-white border-b border-stone-100 p-4 sticky top-0 z-10">
                            <div className="max-w-2xl mx-auto flex justify-between items-center">
                                <button onClick={() => setShowExitConfirm(true)} className="p-2 text-stone-400 hover:text-malbec transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                                <div className="flex items-center gap-4">
                                    {mode === 50 && <div className="px-3 py-1 rounded-full bg-stone-50 text-malbec font-mono font-bold text-sm">{formatTime(timeLeft)}</div>}
                                    <span className="text-sm font-bold text-stone-400">{curr + 1} / {questions.length}</span>
                                </div>
                            </div>
                        </header>

                        {showExitConfirm && (
                            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                                <div className="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl">
                                    <h3 className="serif text-2xl font-bold mb-2">Leave Session?</h3>
                                    <div className="flex gap-3 mt-6">
                                        <button onClick={() => setShowExitConfirm(false)} className="flex-1 py-3 text-stone-500 font-bold">Stay</button>
                                        <button onClick={() => setView('landing')} className="flex-1 py-3 bg-malbec text-white rounded-xl font-bold">Exit</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <main className="flex-1 max-w-2xl w-full mx-auto p-6 py-12">
                            <h2 className="serif text-2xl font-bold mb-10 leading-snug">{q.question}</h2>
                            <div className="space-y-3">
                                {q.options.map((opt, i) => {
                                    const isCorrect = i === q.correctIndex;
                                    const isSelected = answers[curr] === i;
                                    let btnStyle = "border-stone-200 bg-white";
                                    if (mode === 10 && answered) {
                                        if (isCorrect) btnStyle = "border-green-500 bg-green-50 text-green-900";
                                        else if (isSelected) btnStyle = "border-red-500 bg-red-50 text-red-900";
                                        else btnStyle = "opacity-40 border-stone-50";
                                    } else if (isSelected) btnStyle = "bg-malbec text-white border-malbec shadow-md";

                                    return (
                                        <button 
                                            key={i} 
                                            disabled={mode === 10 && answered}
                                            onClick={() => handleSelect(i)} 
                                            className={`w-full text-left p-5 rounded-2xl border-2 transition-all font-medium flex gap-4 ${btnStyle}`}
                                        >
                                            <span className="opacity-40 font-bold">{String.fromCharCode(65 + i)}.</span>
                                            {opt}
                                        </button>
                                    );
                                })}
                            </div>

                            {mode === 10 && answered && (
                                <div className="mt-8 p-6 bg-stone-50 rounded-2xl border border-stone-100 text-sm leading-relaxed fade-in">
                                    <span className="font-bold text-malbec block mb-1">Explanation:</span>
                                    {q.explanation}
                                </div>
                            )}
                        </main>

                        <footer className="p-6 bg-white border-t border-stone-100 sticky bottom-0">
                            <div className="max-w-2xl mx-auto flex justify-between">
                                <button onClick={() => setCurr(prev => prev - 1)} disabled={curr === 0} className="px-6 py-2 font-bold text-malbec disabled:opacity-20 transition-opacity">Back</button>
                                <button 
                                    onClick={() => curr === questions.length - 1 ? setView('results') : setCurr(prev => prev + 1)}
                                    disabled={mode === 10 && !answered}
                                    className="px-10 py-3 bg-malbec text-white rounded-xl font-bold shadow-lg disabled:opacity-50 transition-all active:scale-95"
                                >
                                    {curr === questions.length - 1 ? 'Finish' : 'Next'}
                                </button>
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'results') {
                const score = calculateScore();
                const pass = (score / questions.length) >= 0.55;
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in">
                        <div className={`p-12 rounded-[3rem] shadow-2xl max-w-sm w-full ${pass ? 'bg-malbec' : 'bg-stone-900'} text-white`}>
                            <h2 className="serif text-4xl font-black mb-8">{pass ? 'Distinction!' : 'Try Again'}</h2>
                            <div className="text-7xl font-black mb-10">{score}<span className="text-2xl opacity-30">/{questions.length}</span></div>
                            <button onClick={() => setView('landing')} className="w-full py-4 bg-white text-malbec rounded-2xl font-black shadow-lg">Return to Cellar</button>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>DecantEd</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900 font-sans">
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        
        // PASTE YOUR WORKER URL HERE:
        const WORKER_URL = "https://decanted-api.nbilbao.workers.dev/";

        function App() {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const startQuiz = async (count) => {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: JSON.stringify({ count })
                    });
                    if (!res.ok) throw new Error(await res.text());
                    const data = await res.json();
                    alert("Success! Loaded " + data.length + " questions.");
                    console.log(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <h1 class="text-5xl font-serif font-bold text-[#4A0E2E] mb-8">DecantEd</h1>
                    {loading ? <p>Loading questions...</p> : (
                        <div className="space-y-4">
                            <button onClick={() => startQuiz(10)} className="bg-[#4A0E2E] text-white px-8 py-4 rounded-xl font-bold">Quick Sip (10 Qs)</button>
                        </div>
                    )}
                    {error && <p className="text-red-600 mt-4 bg-red-50 p-2 rounded">Error: {error}</p>}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>

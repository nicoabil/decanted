<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecantEd - WSET Level 2 Study Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-malbec { background-color: #4A0E2E; }
        .text-malbec { color: #4A0E2E; }
        .border-malbec { border-color: #4A0E2E; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('landing');
            const [mode, setMode] = useState(null); // 10 or 50
            const [questions, setQuestions] = useState([]);
            const [curr, setCurr] = useState(0);
            const [answers, setAnswers] = useState({});

            // Mock Questions (In a real app, you'd fetch these from an AI API)
            const mockQuestions = [
                { 
                    q: "Which grape variety is often used for Chablis?", 
                    options: ["Chardonnay", "Sauvignon Blanc", "Riesling", "Pinot Grigio"], 
                    correct: 0,
                    why: "Chablis is a cool-climate region in Burgundy famous for 100% Chardonnay."
                },
                { 
                    q: "What does 'Tannin' provide in red wine?", 
                    options: ["Sweetness", "Acidity", "Structure/Drying Sensation", "Bubbles"], 
                    correct: 2,
                    why: "Tannins come from grape skins and create a drying, textural sensation."
                }
            ];

            const start = (count) => {
                setMode(count);
                setQuestions(mockQuestions); // For this demo, using pre-set questions
                setAnswers({});
                setCurr(0);
                setView('quiz');
            };

            const select = (idx) => {
                if (mode === 10 && answers[curr] !== undefined) return;
                setAnswers({...answers, [curr]: idx});
            };

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <h1 className="serif text-6xl text-malbec mb-2 font-black">DecantEd</h1>
                    <p className="text-stone-500 mb-12 font-medium tracking-wide uppercase text-sm">WSET Level 2 Mastery</p>
                    
                    <div className="space-y-4 w-full max-w-sm">
                        <button onClick={() => start(10)} className="w-full p-6 bg-white border-2 rounded-2xl hover:border-malbec transition-all text-left group">
                            <div className="font-bold text-malbec">Quick Sip</div>
                            <div className="text-xs text-stone-400">10 Questions • Instant Feedback</div>
                        </button>
                        
                        <button onClick={() => start(50)} className="w-full p-6 bg-malbec text-white rounded-2xl hover:opacity-90 transition-all text-left">
                            <div className="font-bold">Full Vintage</div>
                            <div className="text-xs text-white/60">50 Questions • Exam Mode</div>
                        </button>
                    </div>
                </div>
            );

            if (view === 'quiz') {
                const q = questions[curr];
                const answered = answers[curr] !== undefined;

                return (
                    <div className="min-h-screen p-6 max-w-2xl mx-auto">
                        <div className="flex justify-between items-center mb-12">
                            <button onClick={() => setView('landing')} className="text-malbec font-bold">✕ Close</button>
                            <span className="font-bold text-stone-400">{curr + 1} / {questions.length}</span>
                        </div>

                        <h2 className="serif text-3xl text-stone-900 mb-8 font-bold">{q.q}</h2>
                        
                        <div className="space-y-3">
                            {q.options.map((opt, i) => {
                                let style = "border-stone-200 bg-white";
                                if (mode === 10 && answered) {
                                    if (i === q.correct) style = "border-green-500 bg-green-50 text-green-900";
                                    else if (answers[curr] === i) style = "border-red-500 bg-red-50 text-red-900";
                                } else if (answers[curr] === i) {
                                    style = "bg-malbec text-white border-malbec";
                                }

                                return (
                                    <button key={i} onClick={() => select(i)} className={`w-full text-left p-5 rounded-2xl border-2 transition-all font-medium ${style}`}>
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>

                        {mode === 10 && answered && (
                            <div className="mt-8 p-6 bg-stone-100 rounded-2xl border border-stone-200 italic text-stone-700">
                                <strong>Note:</strong> {q.why}
                            </div>
                        )}

                        <div className="mt-12 flex justify-between">
                            <button onClick={() => setCurr(curr - 1)} disabled={curr === 0} className="px-6 py-2 disabled:opacity-20 font-bold text-malbec">Back</button>
                            <button 
                                onClick={() => curr === questions.length - 1 ? setView('results') : setCurr(curr + 1)}
                                className="px-10 py-3 bg-malbec text-white rounded-xl font-bold"
                            >
                                {curr === questions.length - 1 ? 'Finish' : 'Next'}
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'results') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <h2 className="serif text-4xl text-malbec mb-4 font-bold">Tasting Complete</h2>
                    <button onClick={() => setView('landing')} className="underline font-bold text-malbec">Try another flight</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
